services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.10.*}
    # nginx 뒤에 있으므로 호스트에 직접 노출 불필요. 직접 접근이 필요한 경우 주석 해제
    # ports:
    #   - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app/api
      - ./models:/app/models
    environment:
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        reservations:
          devices:
            # NVIDIA 드라이버와 GPU를 컨테이너에 명시적으로 할당
            - driver: nvidia  
              count: ${GPU_COUNT:-0}
              capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    # nginx 뒤에 있으므로 호스트에 직접 노출 불필요. 직접 접근이 필요한 경우 주석 해제
    # ports:
    #   - "${FRONTEND_PORT:-8501}:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      # Docker 안에서는 localhost가 자기 자신을 가리키므로, frontend->api 통신을 위해 nginx로 접근
      - API_URL=http://nginx:80  

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-5001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
