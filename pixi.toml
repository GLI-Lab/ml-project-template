# https://pixi.prefix.dev/v0.43.0/python/pytorch/?utm_source=chatgpt.com#system-requirements

[workspace]
name = "ml-project-template"
version = "0.1.0"
description = "ML project template - local training/tuning environment"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
numpy = "*"
matplotlib = "*"
tqdm = "*"
jupyterlab = "*"
##########################################################################################
# EXAMPLE (Vision)
pillow = "*"
##########################################################################################

[pypi-dependencies]  # CUDA 기반
torch = { version = "==2.10.*", index = "https://download.pytorch.org/whl/cu128" }
##########################################################################################
# EXAMPLE (Vision)
# https://github.com/pytorch/vision?tab=readme-ov-file#installation
torchvision = { version = "==0.25.*", index = "https://download.pytorch.org/whl/cu128" }
##########################################################################################

[target.osx-arm64.pypi-dependencies]  # CUDA 없음
torch = { version = "==2.10.*", index = "https://download.pytorch.org/whl/cpu" }
##########################################################################################
# EXAMPLE (Vision)
# https://github.com/pytorch/vision?tab=readme-ov-file#installation
torchvision = { version = "==0.25.*", index = "https://download.pytorch.org/whl/cpu" }
##########################################################################################

[feature.serving.pypi-dependencies]  # 개발용 서빙 (도커X)
fastapi = "*"
uvicorn = { version = "*", extras = ["standard"] }
pydantic = ">=2.0"
python-multipart = "*"
streamlit = "*"
httpx = "*"

[feature.serving.tasks]
# pixi run -e serving <TASK>
api = "uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
frontend = "streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"

[tasks]
# pixi run <TASK>
# train = "python train/train.py --config train/config.yaml --epochs 50 --batch-size 32 --lr 1e-3"
gpu-test = 'python -c "import torch; print(torch.__version__); print(torch.cuda.is_available())"'
gpu-info = 'python -c "import torch; [print(f\"GPU {i}: {torch.cuda.get_device_name(i)}, {torch.cuda.get_device_properties(i).total_memory // 1024**3}GB\") for i in range(torch.cuda.device_count())]"'
docker-gpu-test = 'sudo docker compose exec api python -c "import torch; print(torch.__version__); print(torch.cuda.is_available())"'
docker-gpu-info = 'sudo docker compose exec api python -c "import torch; [print(f\"GPU {i}: {torch.cuda.get_device_name(i)}, {torch.cuda.get_device_properties(i).total_memory // 1024**3}GB\") for i in range(torch.cuda.device_count())]"'

[target.osx-arm64.tasks]
gpu-test = 'python -c "import torch; print(torch.__version__); print(torch.backends.mps.is_available())"'
gpu-info = 'python -c "import subprocess, torch; mem=int(subprocess.check_output([\"sysctl\",\"-n\",\"hw.memsize\"])); print(f\"MPS available: {torch.backends.mps.is_available()}\"); print(f\"Unified Memory: {mem // 1024**3}GB (CPU+GPU shared)\")"'

[environments]
default = []          # 학습만
serving = ["serving"] # 학습 + 서빙 (도커X)
